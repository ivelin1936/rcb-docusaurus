services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rcb-docusaurus:local
    container_name: rcb-docs
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/rcb-docusaurus/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Development server — hot reload (mounts source, uses node directly)
  docs-dev:
    image: node:20-alpine
    container_name: rcb-docs-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --port 3000"
    environment:
      - NODE_ENV=development
    profiles:
      - dev
